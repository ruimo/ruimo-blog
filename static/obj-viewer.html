<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2a2a2a;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        #viewer-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="viewer-container">
        <div id="loading">読み込み中...</div>
        <div id="error"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        const container = document.getElementById('viewer-container');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        // シーン
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);

        // カメラ
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);

        // レンダラー
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // コントロール
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ライト
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dl1.position.set(5, 5, 5);
        scene.add(dl1);
        const dl2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dl2.position.set(-5, -5, -5);
        scene.add(dl2);

        // グリッド
        scene.add(new THREE.GridHelper(10, 10));

        // リサイズ
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // アニメーション
        (function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        })();

        function onLoaded(object) {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const scale = 4 / Math.max(size.x, size.y, size.z);
            object.scale.multiplyScalar(scale);
            object.position.sub(center.multiplyScalar(scale));
            object.traverse((child) => {
                if (child instanceof THREE.Mesh) {
                    // 頂点カラーがあればそちらを優先
                    const hasVertexColor = child.geometry.attributes.color != null;
                    child.material = new THREE.MeshPhongMaterial({
                        color: hasVertexColor ? 0xffffff : 0x888888,
                        vertexColors: hasVertexColor,
                        side: THREE.DoubleSide
                    });
                }
            });
            scene.add(object);
            loadingEl.remove();
        }

        function onError(err) {
            loadingEl.remove();
            errorEl.style.display = 'block';
            errorEl.textContent = '読み込み失敗: ' + modelPath;
            console.error(err);
        }

        // URLパラメータからモデルを読み込む（.ply / .obj 対応）
        const modelPath = new URLSearchParams(window.location.search).get('model');
        if (modelPath) {
            const ext = modelPath.split('.').pop().toLowerCase();
            if (ext === 'ply') {
                new PLYLoader().load(
                    modelPath,
                    (geometry) => {
                        geometry.computeVertexNormals();
                        const mesh = new THREE.Mesh(geometry);
                        onLoaded(mesh);
                    },
                    null,
                    onError
                );
            } else {
                new OBJLoader().load(modelPath, onLoaded, null, onError);
            }
        } else {
            loadingEl.textContent = 'model パラメータがありません';
        }
    </script>
</body>
</html>
